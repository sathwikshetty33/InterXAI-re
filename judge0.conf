################################################################################
# Judge0 Configuration
# https://github.com/judge0/judge0/blob/master/judge0.conf
################################################################################

# Database
POSTGRES_HOST=judge0_db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0password

# Redis
REDIS_HOST=judge0_redis
REDIS_PASSWORD=judge0redispassword

# Disable telemetry
JUDGE0_TELEMETRY_ENABLE=false

# Resource limits
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=256000
MAX_CPU_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000

# Workers
INTERVAL=0.1
COUNT=2
MAX_QUEUE_SIZE=100

# Allow all origins (restrict in production)
ALLOW_ORIGIN=*

# Batched submissions
ENABLE_BATCHED_SUBMISSIONS=true
MAX_SUBMISSION_BATCH_SIZE=20

# Rails
RAILS_ENV=production
RAILS_MAX_THREADS=4
SECRET_KEY_BASE=interxai_judge0_secret_key_change_in_production
