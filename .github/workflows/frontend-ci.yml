name: CI - Frontend Checks

on:
push:
branches: ["*"]
paths:
- "frontend/**"
pull_request:
branches: ["*"]
paths:
- "frontend/**"

jobs:
frontend:
name: Frontend Lint & Build
runs-on: ubuntu-latest


defaults:
  run:
    working-directory: frontend

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install dependencies
    run: npm install

  - name: Run lint
    run: npm run lint

  - name: Run format check (optional)
    run: npm run format:check

  - name: Build project
    run: npm run build
